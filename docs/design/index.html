<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeekyCheck</title>
</head>
<body>

<header>
    <h1>Gestor de Tareas</h1>
</header>

<main>
    <section class="task-list">
        <h2>Listado de Tareas</h2>
        <ul id="task-list">

        </ul>
    </section>

    <section class="add-task">
        <button id="btn-add-task">Nueva Tarea</button>

        <form id="new-task-form">
            <label for="task">Nueva tarea:</label>
            <input type="text" id="task" name="task" required>
            <button type="submit">Agregar</button>
        </form>
    </section>

</main>

<aside>
    <h3>Estadísticas</h3>
    <p>Total: <span id="total">0</span></p>
    <p>Pendientes: <span id="pending">0</span></p>
    <p>Completadas: <span id="completed">0</span></p>

</aside>

<footer>
    <p>2026 WeekyCheck</p>
</footer>

<template id="template-tarea">
        <li>
            <input type="checkbox" class="completada">
            <span class="texto-tarea">Tarea de ejemplo</span>
            <button class="delete">Eliminar</button>
        </li>
    </template>



</body>
</html>
