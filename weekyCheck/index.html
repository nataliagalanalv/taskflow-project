<!DOCTYPE html>
<html lang="es" class="bg-white text-black dark:bg-gray-900 dark:text-gray-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeekyCheck</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="font-sans">

    <div class="flex min-h-screen">

        <aside class="w-72 bg-purple-200 dark:bg-gray-800 p-6 flex flex-col justify-between border-r dark:border-gray-700 sticky top-0 h-screen">
            <div>
                <div class="profile mt-10 text-center">
                    <h2 class="text-3xl font-bold mb-2">WeekyCheck</h2>
                </div>

                <div class="relative group p-6 rounded-3xl bg-slate-800 shadow-2xl flex flex-col items-center overflow-hidden mt-20">
        
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-fuchsia-600/20 blur-[50px] rounded-full"></div>
                    <h3 class="relative text-white font-semibold text-[10px] mb-6 uppercase tracking-widest opacity-80">Progreso Total</h3>

                    <div id="radial-chart" class="relative flex items-center justify-center w-32 h-32 rounded-full transition-all duration-700 shadow-[0_0_20px_rgba(168,85,247,0.2)]"
                            style="background: conic-gradient(#d946ef 0%, #334155 0%)"> 
            
                        <div class="absolute inset-3 bg-slate-900/90 backdrop-blur-xl rounded-full flex flex-col items-center justify-center border border-white/10 shadow-inner">
                            <span class="text-2xl font-black text-white tracking-tighter flex items-baseline">
                                <span id="percentage-label">0</span>
                                <span class="text-xs text-fuchsia-400 ml-0.5">%</span>
                            </span>

                            <span id="total" class="hidden">0</span>
                            <span id="total" class="text-[8px] text-white/40 uppercase font-bold tracking-tighter">    
                            </span>
                        </div>
                    </div>

                    <div class="mt-6 flex justify-between w-full text-[10px] font-bold tracking-tighter px-2">
                        <div class="flex flex-col items-center">
                            <span class="text-fuchsia-400 text-sm" id="completed">0</span>
                            <span class="text-white/30 uppercase">Hechas</span>
                        </div>
            
                        <div class="w-[1px] h-6 bg-white/10 self-center"></div>
            
                        <div class="flex flex-col items-center">
                            <span class="text-white/60 text-sm" id="pending">0</span>
                            <span class="text-white/30 uppercase">Pendientes</span>
                        </div>
                    </div>
                </div>

                <div class="settings mb-6 mt-20 p-4 bg-white/50 dark:bg-gray-700 rounded-xl shadow-sm">
                    <h3 class="font-semibold text-lg text-center mb-3 text-sm uppercase tracking-wider">Configuración</h3>
                    <button id="mark-all-completed" class="w-full mb-2 px-3 py-2 text-base bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors">Marcar todas como completadas</button>
                    <button id="delete-all-completed" class="w-full px-3 py-2 text-base bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">Eliminar completadas</button>
                </div>

            </div>
        </aside>

        <div class="flex-1 flex flex-col">

        <main class="flex-1 p-8 bg-gray-50 dark:bg-gray-900">
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">Hola, <span class="text-purple-600">Usuario</span></h1>
                <button id="toggle-dark" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-full hover:scale-110 transition-transform">🌙</button>
            </header>

            <div class="flex gap-3 mb-6">
                <button id="btn-new-task" class="px-4 py-2 bg-blue-600 text-white rounded-lg shadow-md transition-all">+ Nueva Tarea</button>
            </div>

            <div id="form-container" class="mb-6">
                <form id="new-task-form" class="flex gap-2 p-4 bg-white dark:bg-gray-800 rounded-xl shadow-sm border dark:border-gray-700">
                    <input type="text" id="task" placeholder="¿Qué hay que hacer hoy?" class="flex-1 p-2 bg-transparent focus:outline-none">
                    <button type="submit" class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">Agregar</button>
                </form>
            </div>
        
            <div class="flex flex-wrap gap-3 mb-6 items-center">
                <div class="flex bg-gray-200 dark:bg-gray-800 p-1 rounded-lg">
                    <button class="filter-btn px-4 py-2 bg-gray-200 text-gray-700 rounded-lg" data-filter="all">Todas</button>
                    <button class="filter-btn px-4 py-2 bg-gray-200 text-gray-700 rounded-lg" data-filter="pending">Pendientes</button>
                    <button class="filter-btn px-4 py-2 bg-gray-200 text-gray-700 rounded-lg" data-filter="completed">Hechas</button>
                </div>
                <div class="flex-1 min-w-[200px] relative">
                    <input id="search-task" type="text" placeholder="Buscar tarea..." class="w-full p-2.5 pl-4 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-xl shadow-sm focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
            </div>

            <ul id="task-list" class="grid gap-3"></ul>
        </main>

        <footer class="text-center p-4 bg-gray-100 dark:bg-gray-800">
            <p>@2026 WeekyCheck</p>
        </footer>

        </div>
    </div>


    
    <template id="template-task">
        <li class="flex items-center justify-between p-4 bg-white dark:bg-gray-800 border dark:border-gray-700 rounded-xl shadow-sm hover:shadow-md transition-shadow">
            <div class="flex items-center gap-4">
                <input type="checkbox" class="select w-5 h-5 accent-purple-600 cursor-pointer">
                <span class="task-description font-medium"></span>
            </div>
            <div class="flex gap-2">
                <button class="edit-task-btn bg-cyan-400 text-white-500 hover:bg-orange-50 p-2 rounded-lg transition-colors">✎</button>
                <button class="delete-task-btn bg-red-400 text-white-500 hover:bg-red-50 p-2 rounded-lg transition-colors">✕</button>
                <button class="complete-task-btn bg-green-400 text-white-500 hover:bg-green-50 p-2 rounded-lg transition-colors">✓</button>
            </div>
        </li>
    </template>

    <script src="js/app.js"></script>
</body>

</html>
