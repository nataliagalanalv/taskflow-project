<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeekyCheck</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="main">

    <aside class="sidebar">

        <div class="profile">
            <h2 class="logo">WeekyCheck</h2>
            <img src="" alt="avatar">
            <p>Usuario</p>
        </div>

        <div class="stadistics">
            <h3>Estadísticas</h3>
            <p>Total: <span id="total">0</span></p>
            <p>Pendientes: <span id="pending">0</span></p>
            <p>Completadas: <span id="completed">0</span></p>
        </div>
    </aside>

    <main class="content">

        <header class="header">
            <h1>Hola, <span>Usuario</span></h1>
            <div class="search-box">
                <input type="text" placeholder="Buscar tareas">
            </div>
        </header>


        <h2>Listado de Tareas</h2>

        <div class="filters">
            <button class="filter-btn" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="pending">Pendientes</button>
            <button class="filter-btn" data-filter="completed">Completadas</button> 
        </div>

        <div class="task-container">
            <ul id="task-list"></ul>

        </div>
    
        <div class="actions">

            <button id="mark-completed">Completada</button>
            <button id="btn-new-task">Nueva Tarea</button>

            <form id="new-task-form" style="display: none;">
                <label for="task">Nueva tarea:</label>
                <input type="text" id="task" name="Escribe tu tarea" required>
                <button type="submit">Agregar</button>
            </form>
        </div>
    </main>

    
</div>

<footer>
    <p>2026 WeekyCheck</p>
</footer>

    <template id="template-task">
        <li class="task-item">
            <input type="checkbox" class="select">
            <span class="task-description"></span>
            <small class="task-date"></small>
            <small class="status"></small>
        </li>
    </template>

    <script src="js/app.js"></script>

</body>
</html>
