<!DOCTYPE html>
<html lang="es" class="bg-white text-black dark:bg-[#020617] transition-colors duration-500">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeekyCheck</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>

<body class="font-sans bg-gray-50 dark:bg-[#020617] text-slate-900 dark:text-slate-100 transition-colors duration-500">
    
    <div class="flex flex-col-reverse lg:flex-row min-h-screen w-full overflow-x-hidden">

        
        <aside class="w-full lg:w-80 bg-purple-200 dark:bg-slate-900 p-6 border-t lg:border-t-0 lg:border-r border-gray-300 dark:border-slate-800 lg:h-screen lg:sticky lg:top-0 flex-shrink-0">
            <div class="profile mt-10 text-center">
                <h2 class="text-3xl font-black mb-2 text-purple-900 dark:text-fuchsia-500 dark:drop-shadow-[0_0_10px_rgba(217,70,239,0.4)]">WeekyCheck</h2>
            </div>

            
            <div class="relative group p-6 rounded-3xl bg-white/50 dark:bg-slate-800/50 backdrop-blur-xl shadow-2xl flex flex-col items-center overflow-hidden mt-10 border border-transparent dark:border-fuchsia-500/20">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-fuchsia-600/20 blur-[50px] rounded-full"></div>
                <h2 class="relative text-purple-900 dark:text-white font-semibold text-[20px] mb-6 uppercase tracking-widest opacity-80">Progreso Total</h2>
                
                <div id="radial-chart" class="relative flex items-center justify-center w-32 h-32 rounded-full transition-all duration-700 shadow-lg" style="background: conic-gradient(#d946ef 0%, #334155 0%)"> 
                    <div class="absolute inset-3 bg-white dark:bg-slate-900 rounded-full flex flex-col items-center justify-center border border-purple-100 dark:border-white/10 shadow-inner">
                        <span class="text-2xl font-black text-slate-800 dark:text-white tracking-tighter flex items-baseline">
                            <span id="percentage-label">0</span><span class="text-xs text-fuchsia-500 ml-0.5">%</span>
                        </span>
                        <span id="total" class="hidden">0</span>
                    </div>
                </div>

                <div class="mt-6 flex justify-between w-full text-[18px] font-bold tracking-tighter px-2">
                    <div class="flex flex-col items-center text-fuchsia-600 dark:text-fuchsia-400"><span class="text-sm" id="completed">0</span><span class="opacity-50">Hechas</span></div>
                    <div class="w-[1px] h-6 bg-purple-300 dark:bg-white/10 self-center"></div>
                    <div class="flex flex-col items-center text-slate-600 dark:text-slate-400"><span class="text-sm" id="pending">0</span><span class="opacity-50">Pendientes</span></div>
                </div>
            </div>

            
            <div class="settings mt-10 p-5 bg-white/50 dark:bg-slate-800/40 rounded-2xl shadow-sm border border-transparent dark:border-white/5">
                <h2 class="font-bold text-center mb-4 text-xl uppercase tracking-widest text-purple-800 dark:text-fuchsia-300">Configuración</h2>
                <button id="mark-all-completed" class="w-full mb-2 px-3 py-2 text-md font-semibold bg-green-500 text-white rounded-xl hover:bg-green-600 shadow-lg shadow-green-500/20 transition-all">Marcar todas las tareas como completadas</button>
                <button id="delete-all-completed" class="w-full px-3 py-2 text-md font-semibold bg-red-500 text-white rounded-xl hover:bg-red-600 shadow-lg shadow-red-500/20 transition-all">Eliminar todas las tareas completadas</button>
            </div>
        </aside>

        
        <main class="flex-1 w-full p-6 lg:p-12 dark:bg-[#020617] transition-colors">
            
            <header class="flex justify-between items-center mb-12 w-full">
                <h1 class="text-3xl lg:text-5xl font-black tracking-tighter">Hola, <span class="text-purple-600 dark:text-[#00d2ff] dark:drop-shadow-[0_0_10px_rgba(0,210,255,0.3)]">Usuario</span></h1>
                <button id="toggle-dark" class="p-3 bg-white dark:bg-slate-800 shadow-xl rounded-full hover:scale-110 transition-all border border-gray-200 dark:border-white/10">🌙</button>
            </header>

            <div class="flex gap-4 mb-8">
                <button id="btn-new-task" class="px-8 py-3 bg-blue-600 dark:bg-[#00d2ff] text-white dark:text-slate-950 rounded-2xl shadow-xl dark:shadow-[0_0_20px_rgba(0,210,255,0.3)] font-black transition-all hover:-translate-y-1">
                    + Nueva Tarea
                </button>
            </div>
            
            <div id="form-container" class="mb-10 block w-full"> 
                <form id="new-task-form" class="flex flex-col gap-4 p-6 bg-white dark:bg-slate-900 rounded-2xl shadow-xl border-2 border-purple-100 dark:border-fuchsia-500/20 transition-all">
        
                <div class="flex flex-col md:flex-row gap-3">
                    <input type="text" id="task" placeholder="¿Qué hay que hacer hoy?" 
                        class="flex-1 p-3 bg-transparent focus:outline-none text-xl dark:text-white border-b-2 border-transparent focus:border-purple-400 dark:focus:border-[#00d2ff] transition-all">
                    <button type="submit" class="px-8 py-3 bg-purple-600 dark:bg-fuchsia-600 text-white rounded-xl font-bold shadow-lg hover:scale-105 transition-all active:scale-95">Agregar</button>
                </div>

                <div class="flex flex-wrap gap-3">
                    <div class="flex items-center gap-2 bg-gray-100 dark:bg-slate-800 p-2 rounded-xl border dark:border-slate-700">
                        <span class="text-xs font-bold text-slate-500 uppercase ml-1">Prioridad:</span>
                        <select id="task-priority" class="bg-transparent outline-none text-sm font-bold dark:text-white cursor-pointer">
                            <option value="baja">Baja 🟢</option>
                            <option value="media">Media 🟡</option>
                            <option value="alta">Alta 🔴</option>
                        </select>
                    </div>
            
                    <div class="flex items-center gap-2 bg-gray-100 dark:bg-slate-800 p-2 rounded-xl border dark:border-slate-700">
                        <span class="text-xs font-bold text-slate-500 uppercase ml-1">Tipo:</span>
                        <select id="task-type" class="bg-transparent outline-none text-sm font-bold dark:text-white cursor-pointer">
                            <option value="personal">Personal</option>
                            <option value="trabajo">Trabajo</option>
                        </select>
                    </div>
                </div>
            </div>
        </form>
    </div>
        
            <div class="flex flex-col xl:flex-row gap-4 mb-8 items-center w-full">
                <div class="flex bg-gray-200 dark:bg-slate-800/80 p-1 rounded-2xl w-full md:w-auto border dark:border-white/5">
                    <button class="filter-btn flex-1 md:flex-none px-6 py-2 bg-purple-600 dark:bg-fuchsia-600 text-white rounded-xl shadow-md font-bold transition-all" data-filter="all">Todas</button>
                    <button class="filter-btn flex-1 md:flex-none px-6 py-2 text-slate-600 dark:text-slate-400 font-bold transition-all" data-filter="pending">Pendientes</button>
                    <button class="filter-btn flex-1 md:flex-none px-6 py-2 text-slate-600 dark:text-slate-400 font-bold transition-all" data-filter="completed">Hechas</button>
                </div>
                
                <div class="flex flex-col md:flex-row gap-3 w-full xl:flex-1">
                    <select id="filter-priority" class="flex-1 bg-white dark:bg-slate-900 p-3 rounded-2xl border-2 border-transparent focus:border-purple-400 dark:focus:border-[#00d2ff] shadow-sm outline-none dark:text-white transition-all text-sm font-bold">
                        <option value="all">Todas las prioridades</option>
                        <option value="alta">Alta 🔴</option>
                        <option value="media">Media 🟡</option>
                        <option value="baja">Baja 🟢</option>
                    </select>
        
                    <select id="filter-type" class="flex-1 bg-white dark:bg-slate-900 p-3 rounded-2xl border-2 border-transparent focus:border-purple-400 dark:focus:border-[#00d2ff] shadow-sm outline-none dark:text-white transition-all text-sm font-bold">
                        <option value="all">Todos los tipos</option>
                        <option value="personal">Personal</option>
                        <option value="trabajo">Trabajo</option>
                    </select>
                </div>

                <div class="flex-1 w-full">
                    <input id="search-task" type="text" placeholder="Buscar tarea..." 
                           class="w-full p-4 bg-white dark:bg-slate-900 border-2 border-transparent focus:border-purple-500 dark:focus:border-[#00d2ff] rounded-2xl shadow-lg outline-none dark:text-white transition-all">
                </div>
            </div>

            <ul id="task-list" class="grid gap-4 w-full"></ul>
        </main>
    </div>

    <footer class="text-center p-8 bg-white dark:bg-[#020617] border-t border-gray-100 dark:border-slate-800 text-gray-500 text-xs">
        <p>© 2026 WeekyCheck • Design with Neon</p>
    </footer>
    
    <template id="template-task">
    <li class="flex items-center justify-between p-5 bg-white dark:bg-slate-900/80 border border-gray-200 dark:border-fuchsia-500/20 rounded-2xl shadow-sm hover:shadow-xl dark:hover:shadow-[0_0_20px_rgba(217,70,239,0.2)] transition-all duration-300 group">
        <div class="flex items-center gap-4">
            <input type="checkbox" class="select w-6 h-6 accent-fuchsia-500 opacity-50 cursor-not-allowed" disabled>
            <div class="flex flex-col gap-1">
                <span class="task-description font-semibold text-lg text-slate-700 dark:text-fuchsia-50"></span>
                <div class="flex gap-2">
                    <span class="badge-priority text-[9px] uppercase font-black px-2 py-0.5 rounded-md"></span>
                    <span class="badge-type text-[9px] uppercase font-black px-2 py-0.5 rounded-md border dark:border-white/10 text-slate-500 dark:text-slate-400"></span>
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <button class="edit-task-btn p-2 text-[#00d2ff] hover:bg-blue-500/10 rounded-xl transition-all text-xl">✎</button>
            <button class="delete-task-btn p-2 text-red-500 hover:bg-red-500/10 rounded-xl transition-colors text-xl">✕</button>
            <button class="complete-task-btn p-2 text-green-500 hover:bg-green-500/10 rounded-xl transition-colors text-xl">✓</button>
        </div>
    </li>
    </template>

    <script src="js/app.js"></script>
</body>
</html>
